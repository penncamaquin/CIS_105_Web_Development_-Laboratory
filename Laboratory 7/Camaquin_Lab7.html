<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Table - Lab 6</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');

        body {
            font-family: 'Lato', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            border: 1px solid #dddddd;
            border-radius: 10px;
            padding: 30px;
            width: 700px;
        }

        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 25px;
            font-size: 1.6em;
        }

        /* form styles */

        form {
            background-color: #f9f9f9;
            border: 1px solid #dddddd;
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 30px;
        }

        form h2 {
            font-size: 1em;
            color: #555555;
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .form-row label {
            font-size: 0.85em;
            font-weight: 700;
            color: #444444;
            display: block;
            margin-bottom: 4px;
        }

        .form-row input {
            padding: 7px 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-family: 'Lato', sans-serif;
            font-size: 0.9em;
            width: 180px;
            outline: none;
        }

        .form-row input:focus {
            border-color: #888888;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        form button {
            margin-top: 5px;
            padding: 8px 20px;
            background-color: #333333;
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Lato', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
        }

        form button:hover {
            background-color: #555555;
        }

        /* table styles */

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        thead {
            background-color: #333333;
            color: white;
        }

        thead th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 700;
        }

        tbody tr {
            border-bottom: 1px solid #eeeeee;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 9px 14px;
            color: #333333;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Inventory System</h1>

        <!-- form for adding products -->
        <form>
            <h2>Add New Product</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="e.g. Laptop">
                </div>
                <div class="form-group">
                    <label for="productPrice">Price</label>
                    <input type="text" id="productPrice" placeholder="e.g. 999.99">
                </div>
                <div class="form-group">
                    <label for="productStock">Stock Quantity</label>
                    <input type="text" id="productStock" placeholder="e.g. 50">
                </div>
            </div>
            <button type="button" onclick="inventorySystem.handleForm()">Add Product</button>
        </form>

        <!-- inventory table -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Item Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- rows will be added here by renderTable() -->
            </tbody>
        </table>
    </div>

    <script>
        // encapsulated inventory object - all data and methods are inside here
        let inventorySystem = {

            // the inventory array with 5 products
            inventory: [
                { id: 1, name: "Laptop", price: 45000.00, stock: 12 },
                { id: 2, name: "Mechanical Keyboard", price: 2500.00, stock: 30 },
                { id: 3, name: "USB-C Hub", price: 899.99, stock: 55 },
                { id: 4, name: "Monitor 24in", price: 12000.00, stock: 8 },
                { id: 5, name: "Mouse Pad XL", price: 450.00, stock: 100 }
            ],

            // renders the table based on the inventory array
            renderTable() {
                let tbody = document.getElementById("tableBody");
                tbody.innerHTML = ""; // clear the table first

                for (let product of this.inventory) {
                    let row = `<tr>
                        <td>${product.id}</td>
                        <td>${product.name}</td>
                        <td>${product.price.toFixed(2)}</td>
                        <td>${product.stock}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                }
            },

            // method to add a new product
            // price is a float, stock is an integer
            addProduct(name, price, stock) {
                let newId = this.inventory.length + 1;

                let newProduct = {
                    id: newId,
                    name: name,
                    price: parseFloat(price),   // make sure price is a float
                    stock: parseInt(stock)       // make sure stock is an integer
                };

                this.inventory.push(newProduct);
                this.renderTable();
            },

            // handles the form and calls addProduct()
            handleForm() {
                let name = document.getElementById("productName").value;
                let price = document.getElementById("productPrice").value;
                let stock = document.getElementById("productStock").value;

                // simple check if fields are empty
                if (name === "" || price === "" || stock === "") {
                    alert("Please fill in all fields.");
                    return;
                }

                this.addProduct(name, price, stock);

                // clear the inputs after adding
                document.getElementById("productName").value = "";
                document.getElementById("productPrice").value = "";
                document.getElementById("productStock").value = "";
            }
        };

        // render the table on page load
        inventorySystem.renderTable();
    </script>
</body>
</html>
