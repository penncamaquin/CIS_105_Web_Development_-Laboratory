<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Reservation System</title>
</head>

<body>
    <h1>HTML RESTAURANT</h1>
    <form>
        <label for="Name">Name: </label><br>
        <input type="text" id="Name" name="name"><br><br>
        
        <label for="Email">Email: </label><br>
        <input type="text" id="Email" name="email"><br><br>
       
        <label for="PhoneNo">Phone No.: </label><br>
        <input type="text" id="PhoneNo" name="phoneno"><br><br>
       
        <label for="Date">Date: </label><br>
        <input type="date" id="Date" name="date"><br><br>
       
        <label for="Quantity">How many persons will be with you? </label><br>
        <input type="text" id="Quantity" name="Quantity"><br><br>
        
        <label for="Notes">Notes </label><br>
        <input type="text" id="Notes" name="notes"><br><br>
        
        <label for="Entry">Entry </label><br>
        <input type="text" id="Entry" name="entry"><br><br>

        <input type="submit">
    </form>

</body>
</html>
