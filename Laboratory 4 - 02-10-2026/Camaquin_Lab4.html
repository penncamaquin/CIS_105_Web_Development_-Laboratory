<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory 4</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            background-color: #75B06F;
        }

        p.header {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size:50px;
            font-weight: 500;
            text-align: center;
            color: #061E29
        }

        p.reset {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;           
        }

        #click {
            background-color: #FFF19B;
            border: none;
            text-align: center;
            border-radius: 12%;
            height: 100px;
            width: 100px;
            margin: 5px;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2), 0 6px 20px 0 rgba(0,0,0,0.19);;
        }

        #click:hover 
            {box-shadow:0 8px 16px 0 rgba(0,0,0,0.6)}

        #reset {
            background-color: #FFF19B;
            border: none;
            text-align: center;
            height: 50px;
            width: 100px;
            margin: 5px;
            border-radius: 20%
        }

        div.platform {
            display: grid;
            grid-template-columns: 33% 33% 33%;
            flex-wrap:wrap;
        }
    </style>
</head>

<body>

    <div class = "main">
        <div class = "header">
            <p class = "header">Tic-Tac-Toe</p>
        </div>

            </div>

            <div class = "button">

            </div>

            <div class = "button">
                <button type = "button" id = "click">
            </div>

            <div class = "button">
                <button type = "button" id = "click">
            </div>

            <div class = "button">
                <button type = "button" id = "click">
            </div>

            <div class = "button">
                <button type = "button" id = "click">
            </div>

            <div class = "button">
                <button type = "button" id = "click">
            </div>

            <div class = "button">
                <button type = "button" id = "click">
            </div>

        </div>
        <br>
        <br>
        <div class = "reset">
            <button type = "button" id = "reset">
                <p class = "reset">Reset Game</p>
            </button>
        </div>

    </div>


</body>

</html>
